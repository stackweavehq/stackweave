name: typescript-strict
description: Strict TypeScript conventions
layer: lang
version: 1.0.0
dependencies:
  - base-conventions
variables:
  strict_mode:
    type: boolean
    default: true
    description: Enable strict TypeScript checks
  target:
    type: string
    default: "ES2022"
    description: TypeScript compilation target
  module_resolution:
    type: string
    default: "bundler"
    description: Module resolution strategy (bundler, node16, nodenext)
  path_aliases:
    type: boolean
    default: true
    description: Enable path aliases via baseUrl/paths in tsconfig
